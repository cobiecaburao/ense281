<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/style.css">
        <title>Burn After Reading</title>
    </head>
    <body>
        <h1>Burn After Reading</h1>

        <div id="board">
        </div>
        <!-- Bootstrap card component -->
        <div class="card">
            <div class="card-body">
                <input type="text" id="title" placeholder="Title">
                <h5>Contents</h5>
                <textarea id="content" rows="6" cols="18"></textarea><br>
                <button type="button" class="btn btn-primary" onclick="addNote()">Post!</button>
            </div>
        </div>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
        <script>
            const colors = ['#ff7eb9', '#ff65a3', '#7afcff', '#feff9c', '#fff740'];
            let colorIndex = 0;

            function addNote() {
                const title = document.getElementById('title');
                const content = document.getElementById('content');

                if(title.value === "" || content.value === "") {
                    alert("incomplete note!");
                    return;
                }

                const newNote = document.createElement('div');
                newNote.classList.add('card');
                newNote.style.backgroundColor = colors[colorIndex];
                newNote.innerHTML = `
                <div class="card-body">                    
                    <h3>${title.value}</h3>
                    <p>${content.value}</p>
                    <button type="button" class="btn btn-danger" onclick="burnNote(this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-fire" viewBox="0 0 16 16">
                            <path d="M8 16c3.314 0 6-2 6-5.5 0-1.5-.5-4-2.5-6 .25 1.5-1.25 2-1.25 2C11 4 9 .5 6 0c.357 2 .5 4-2 6-1.25 1-2 2.729-2 4.5C2 14 4.686 16 8 16m0-1c-1.657 0-3-1-3-2.75 0-.75.25-2 1.25-3C6.125 10 7 10.5 7 10.5c-.375-1.25.5-3.25 2-3.5-.179 1-.25 2 1 3 .625.5 1 1.364 1 2.25C11 14 9.657 15 8 15"/>
                        </svg>
                    </button>
                </div>`;
                
                colorIndex = (colorIndex + 1) % colors.length;

                // add note to board
                document.getElementById('board').appendChild(newNote);
                
                // empty inputs
                title.value = "";
                content.value = "";
            }

            function burnNote(button) {
                const toBurn = button.parentElement.parentElement;
                toBurn.remove();
            }
        </script>
    </body>
</html>
