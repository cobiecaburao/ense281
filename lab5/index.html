<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <h1>Vote-Note</h1><br>

    <div class="accordion" id="accordionExample">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
          Log In
          </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
          <div class="accordion-body">
            <h2>Log in</h2>
            <form action="/todo.html" method="get">
              <label for="email">Email address</label><br>
              <input type="text" class="textbox" id="email" name="email" placeholder="Email address"><br>
              <label for="pass">Password</label><br>
              <input type="text" class="textbox" id="pass" name="pass" placeholder="Password"><br> 
              <button type="button" class="btn btn-primary btn-adjust">Log in</button>
            </form>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
            Register
          </button>
        </h2>
        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
          <div class="accordion-body">
            <h2>Sign up</h2>
            <form action="/todo.html" method="get">
              <label for="email">Email address</label><br>
              <input type="text" class="textbox" id="email" name="email" placeholder="Email address"><br>
              <label for="pass">Password</label><br>
              <input type="text" class="textbox" id="pass" name="pass" placeholder="Password"><br>
              <label for="invite">Invite Code</label><br>
              <input type="text" class="textbox" id="invite" name="invite" placeholder="Invite Code"><br>
              <button type="button" class="btn btn-primary .btn-adjust">Sign up</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script> 
    <script src="js/Node.js"></script>
  </body>
</html>
